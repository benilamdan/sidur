name: Weekly Auto Publish

on:
  schedule:
    - cron: '0 17 * * 6'  # Saturday 17:00 UTC = 20:00 Israel (IDT, UTC+3)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run auto_publish.py
        run: python auto_publish.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sidur_live.html version.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "סידור אוטומטי שבוע $(python -c 'from datetime import date,timedelta; d=date.today(); print(date.today()+timedelta(days=(6-d.weekday())%7 or 7))')"
          git push
